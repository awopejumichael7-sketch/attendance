<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CAC Good Works Assembly — Check In</title>
<style>
  :root{
    --ink:#12241f;
    --paper:#f6f3ea;
    --deep:#0f3b34;
    --gold:#c99a3c;
    --good:#2f7a4f;
    --bad:#a63c3c;
    --line:rgba(15,59,52,0.15);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Georgia', 'Iowan Old Style', serif;
    background:radial-gradient(1200px 800px at 50% -10%, #163f37 0%, var(--deep) 55%, #0a2621 100%);
    color:var(--paper);
    min-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:32px 20px 48px;
  }
  header{
    text-align:center;
    margin-bottom:22px;
  }
  .eyebrow{
    letter-spacing:.18em;
    text-transform:uppercase;
    font-size:12px;
    color:var(--gold);
    font-family:'Helvetica Neue',Arial,sans-serif;
    margin-bottom:6px;
  }
  h1{
    margin:0;
    font-size:clamp(24px,4vw,34px);
    font-weight:400;
    letter-spacing:.01em;
  }
  .sub{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:14px;
    color:rgba(246,243,234,0.65);
    margin-top:8px;
  }
  #reader-wrap{
    width:min(420px,92vw);
    aspect-ratio:1/1;
    border-radius:18px;
    overflow:hidden;
    position:relative;
    background:#000;
    border:1px solid rgba(201,154,60,0.4);
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
  }
  #reader-wrap video{width:100%;height:100%;object-fit:cover;}
  .frame{
    position:absolute;inset:14%;
    border:2px solid var(--gold);
    border-radius:14px;
    opacity:.85;
    pointer-events:none;
  }
  .frame::before,.frame::after{content:'';position:absolute;width:26px;height:26px;border:3px solid var(--paper);}
  .scan-line{
    position:absolute;left:14%;right:14%;height:2px;
    background:var(--gold);
    box-shadow:0 0 12px 2px rgba(201,154,60,0.8);
    animation:sweep 2.2s ease-in-out infinite;
  }
  @keyframes sweep{
    0%,100%{top:16%;}
    50%{top:82%;}
  }
  .service-picker{
    width:min(420px,92vw);
    margin-top:18px;
    font-family:'Helvetica Neue',Arial,sans-serif;
  }
  .service-picker label{
    display:block;font-size:12px;letter-spacing:.1em;text-transform:uppercase;
    color:rgba(246,243,234,0.65);margin-bottom:6px;
  }
  select{
    width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--line);
    background:rgba(246,243,234,0.08);color:var(--paper);font-size:16px;
    font-family:'Helvetica Neue',Arial,sans-serif;
  }
  select option{color:#000;}
  #status{
    width:min(420px,92vw);
    margin-top:18px;
    min-height:64px;
    border-radius:14px;
    padding:16px 18px;
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:15px;
    display:flex;
    align-items:center;
    gap:12px;
    transition:background .2s ease, border-color .2s ease;
    background:rgba(246,243,234,0.06);
    border:1px solid var(--line);
  }
  #status.ok{background:rgba(47,122,79,0.18);border-color:var(--good);}
  #status.err{background:rgba(166,60,60,0.18);border-color:var(--bad);}
  #status .dot{width:10px;height:10px;border-radius:50%;background:rgba(246,243,234,0.4);flex:none;}
  #status.ok .dot{background:var(--good);}
  #status.err .dot{background:var(--bad);}
  #status .msg strong{display:block;font-size:17px;margin-bottom:2px;font-family:Georgia,serif;}
  footer{
    margin-top:28px;
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:11px;
    letter-spacing:.06em;
    color:rgba(246,243,234,0.4);
    text-align:center;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">CAC Good Works Assembly</div>
  <h1>Scan to Check In</h1>
  <div class="sub">Hold your QR code steady inside the frame</div>
</header>

<div id="reader-wrap">
  <video id="preview" playsinline muted></video>
  <div class="frame"></div>
  <div class="scan-line"></div>
</div>

<div class="service-picker">
  <label for="serviceSelect">Today's Service</label>
  <select id="serviceSelect">
    <option value="Sunday Service">Sunday Service</option>
    <option value="Bible Study">Bible Study</option>
    <option value="Prayer Meeting">Prayer Meeting</option>
    <option value="Workers' Meeting">Workers' Meeting</option>
    <option value="Youth Service">Youth Service</option>
    <option value="Special Program">Special Program</option>
  </select>
</div>

<div id="status">
  <div class="dot"></div>
  <div class="msg"><strong>Ready</strong><span>Point your camera at the QR code on your card or phone.</span></div>
</div>
<div id="debug" style="width:min(420px,92vw);margin-top:10px;font-family:monospace;font-size:11px;color:rgba(246,243,234,0.5);text-align:center;">frames scanned: 0</div>

<footer>POWERED BY GOOGLE APPS SCRIPT &middot; CAC GOOD WORKS ASSEMBLY ATTENDANCE SYSTEM</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>
<script>
/* =====================================================================
   CONFIGURATION — set this to your deployed Apps Script Web App URL
   (Deploy > New deployment > Web app in the Apps Script editor).
   ===================================================================== */
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxl3JEVSfHQC4DM6Vo6141Mkkr2Ugfg83zOCpeQORU/dev';

const video = document.getElementById('preview');
const statusBox = document.getElementById('status');
const serviceSelect = document.getElementById('serviceSelect');
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

let scanning = true;
let cooldownUntil = 0;
let frameCount = 0;
const debugEl = document.getElementById('debug');

function setStatus(type, title, text){
  statusBox.className = type; // '', 'ok', 'err'
  statusBox.querySelector('.msg').innerHTML = `<strong>${title}</strong><span>${text}</span>`;
}

async function startCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    });
    video.srcObject = stream;
    await video.play();
    requestAnimationFrame(tick);
  }catch(err){
    setStatus('err','Camera unavailable', 'Allow camera access in your browser settings, then reload this page.');
  }
}

function tick(){
  if (video.readyState === video.HAVE_ENOUGH_DATA && scanning && Date.now() > cooldownUntil){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    frameCount++;
    if (debugEl) debugEl.textContent = `frames scanned: ${frameCount} | video: ${video.videoWidth}x${video.videoHeight}`;
    if (code && code.data){
      handleScan(code.data);
    }
  }
  requestAnimationFrame(tick);
}

async function handleScan(rawPayload){
  scanning = false;
  setStatus('', 'Checking…', 'Verifying your QR code.');

  try{
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'checkin',
        qrPayload: rawPayload,
        serviceType: serviceSelect.value,
        device: navigator.userAgent
      })
    });
    const data = await res.json();

    if (data.success){
      setStatus('ok', 'Checked in!', data.lateStatus === 'Late'
        ? 'Welcome — you\'re marked as Late for ' + serviceSelect.value + '.'
        : 'Welcome — you\'re on time for ' + serviceSelect.value + '.');
    } else {
      setStatus('err', 'Not recorded', data.reason || 'Please see an usher for help.');
    }
  } catch(err){
    setStatus('err', 'Connection problem', 'Could not reach the check-in server. Please see an usher.');
  }

  // brief cooldown so the same badge doesn't fire twice, then resume scanning
  cooldownUntil = Date.now() + 4000;
  setTimeout(() => {
    scanning = true;
    setStatus('', 'Ready', 'Point your camera at the QR code on your card or phone.');
  }, 4000);
}

startCamera();
</script>
</body>
</html>
